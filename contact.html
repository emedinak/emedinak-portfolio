  <body>
    <main class="py-5">
      <div class="container" style="max-width: 720px;">
        <a href="index.html" class="text-decoration-none text-dark">

        <div class="card shadow-sm">

            <div class="d-flex align-items-center mb-3">
              <i class="bi bi-envelope me-3 fs-4 text-dark"></i>

                <div class="text-muted small">Email</div>

                  emedinak7@gmail.com

              <i class="bi bi-telephone me-3 fs-4 text-dark"></i>
              <div>
                <div class="text-muted small">Phone</div>
                <div class="fs-5">+34 674 925 268</div>
              </div>
            </div>

            <div class="d-flex align-items-center mb-3">
              <i class="bi bi-github me-3 fs-4 text-dark"></i>
              <div>
                <div class="text-muted small">GitHub</div>
                <a
                  href="https://github.com/emedinak"
                  target="_blank"
                  class="fs-5 text-decoration-none"
                >
                  github.com/emedinak
                </a>
              </div>
            </div>

            <div class="d-flex align-items-center">
              <i class="bi bi-linkedin me-3 fs-4 text-primary"></i>
              <div>
                <div class="text-muted small">LinkedIn</div>
                <a
                  href="https://www.linkedin.com/in/eduardo-medina-krumholz"
                  target="_blank"
                  class="fs-5 text-decoration-none"
                >
                  linkedin.com/in/eduardo-medina-krumholz

          </div>
